<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" role="img" aria-labelledby="title desc">
  <title id="title">Vòng tay phỉ thúy trên tay</title>
  <desc id="desc">A dramatic editorial jade bangle composition on a dark background.</desc>
  <defs>
    <radialGradient id="light" cx="42%" cy="28%" r="70%">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".42" stop-color="#abc4d8" stop-opacity=".82"/>
      <stop offset=".78" stop-color="#1a5276" stop-opacity=".52"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8d0bd"/>
      <stop offset=".62" stop-color="#b9917f"/>
      <stop offset="1" stop-color="#60483f"/>
    </linearGradient>
    <radialGradient id="jade" cx="35%" cy="26%" r="72%">
      <stop offset="0" stop-color="#f6fbfb"/>
      <stop offset=".52" stop-color="#abc4d8"/>
      <stop offset="1" stop-color="#315e72"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="900" height="1120" fill="#050607"/>
  <circle cx="420" cy="350" r="420" fill="url(#light)" opacity=".62"/>
  <g opacity=".88">
    <rect x="190" y="450" width="92" height="530" rx="46" fill="url(#skin)" transform="rotate(-12 236 715)"/>
    <rect x="300" y="398" width="88" height="590" rx="44" fill="url(#skin)" transform="rotate(-3 344 693)"/>
    <rect x="412" y="405" width="88" height="575" rx="44" fill="url(#skin)" transform="rotate(7 456 692)"/>
    <rect x="522" y="455" width="86" height="510" rx="43" fill="url(#skin)" transform="rotate(16 565 710)"/>
    <ellipse cx="420" cy="790" rx="285" ry="170" fill="url(#skin)"/>
  </g>
  <ellipse cx="440" cy="365" rx="285" ry="112" fill="none" stroke="url(#jade)" stroke-width="82" filter="url(#shadow)" transform="rotate(-5 440 365)"/>
  <ellipse cx="352" cy="314" rx="76" ry="25" fill="#fff" opacity=".38" transform="rotate(-20 352 314)"/>
  <path d="M145 248 C260 150 620 126 760 250" fill="none" stroke="#ffffff" stroke-width="2" opacity=".18"/>
</svg>
